<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My New Tab</title>
  <style>
    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      text-align: center;
      background: white;
      padding: 40px 60px;
      border-radius: 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }
    h1 {
      color: #1e2430;
      font-weight: 600;
    }
    input[type="text"] {
      width: 400px;
      padding: 12px 20px;
      border: 2px solid #d8dee8;
      border-radius: 40px;
      font-size: 16px;
      outline: none;
    }
    input[type="text"]:focus {
      border-color: #2f6fed;
    }
    .shortcuts {
      margin-top: 24px;
      display: flex;
      gap: 20px;
      justify-content: center;
    }
    .shortcuts a {
      color: #2f6fed;
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✨ My Custom New Tab</h1>
    <form action="https://www.google.com/search" method="get">
      <input type="text" name="q" placeholder="Search or type URL" autofocus />
    </form>
    <div class="shortcuts">
      <a href="https://news.google.com">News</a>
      <a href="https://github.com">GitHub</a>
      <a href="https://reddit.com">Reddit</a>
    </div>
  </div>
</body>
</html>
